<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 3: Souvenir Shopping Spree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../../../../shared/config/tailwind-theme.js"></script>
    <link rel="stylesheet" href="../../../../shared/styles/style.scss" />
    <link rel="stylesheet" href="../shared/traveler-npc.scss" />
    <style>
      .shop-shelf {
        background: linear-gradient(180deg, #fff8e1 0%, #ffe0b2 100%);
        border: 3px solid #ff9800;
        border-radius: 16px;
        padding: 1.25rem;
      }
      .budget-bar {
        font-variant-numeric: tabular-nums;
      }
      .bell-btn {
        animation: bell-pulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5);
      }
      @keyframes bell-pulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.45);
        }
        50% {
          transform: scale(1.03);
          box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
        }
      }
      .bell-btn.rung {
        animation: none;
        background: #b91c1c;
      }
      .story-intro-panel {
        padding: 2rem 1.75rem;
        max-width: 42rem;
        margin-left: auto;
        margin-right: auto;
      }
      @media (min-width: 768px) {
        .story-intro-panel {
          padding: 2.75rem 3rem;
        }
      }
      .story-intro-body {
        font-size: 1.0625rem;
        line-height: 1.9;
      }
      @media (min-width: 768px) {
        .story-intro-body {
          font-size: 1.125rem;
          line-height: 2;
        }
      }
      .story-intro-body p {
        margin: 0;
      }
      .story-intro-body p + p {
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body class="bg-slate-900 min-h-[100dvh] flex flex-col font-sans">
    <header
      class="bg-slate-800 shadow-lg p-4 flex justify-between items-center flex-wrap gap-2 border-b border-amber-500/30"
    >
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-amber-400">
          🛍️ Level 3: Souvenir Shopping Spree
        </h1>
        <p class="text-amber-200/70 text-sm" id="phase-label">Souvenir Shop</p>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <div
          id="budget-display"
          class="budget-bar px-3 py-1 bg-slate-700 text-amber-300 border border-amber-500/30 font-bold rounded-lg text-sm"
        >
          💰 Budget: $200
        </div>
        <a
          id="hub-link"
          href="../../../grammar-hub/index.html?tab=wh&series=how"
          class="px-4 py-2 bg-slate-700 text-amber-100 rounded-xl hover:bg-slate-600 border border-amber-500/30 font-bold text-sm transition-colors"
        >
          🏠 Home
        </a>
      </div>
    </header>

    <main class="flex-1 p-4 md:p-6 max-w-3xl mx-auto w-full" id="game-main"></main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
