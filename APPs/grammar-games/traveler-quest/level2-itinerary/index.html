<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 2: New Class Icebreakers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../../../../shared/config/tailwind-theme.js"></script>
    <link rel="stylesheet" href="../../../../shared/styles/style.scss" />
    <link rel="stylesheet" href="../shared/traveler-npc.scss" />
    <style>
      .wheel-wrap {
        position: relative;
        width: min(320px, 90vw);
        height: min(320px, 90vw);
        margin: 0 auto;
        overflow: visible;
      }
      .wheel {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 4px solid #34d399;
        transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        overflow: hidden;
        box-shadow: 0 0 20px rgba(52, 211, 153, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
      }
      .wheel-pointer {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 14px solid transparent;
        border-right: 14px solid transparent;
        border-top: 28px solid #e65100;
        z-index: 10;
      }
      .round-hint-box {
        background: #fff8e1;
        border: 2px solid #333;
        border-radius: 8px;
        padding: 0.85rem 1.15rem;
        box-shadow: 3px 3px 0 #000;
        margin-bottom: 1rem;
      }
      .round-hint-box .round-hint-text {
        margin: 0;
        font-family: "Special Elite", monospace;
        font-size: 1.05rem;
        color: #222;
      }
      .story-intro-panel {
        padding: 2rem 1.75rem;
        max-width: 42rem;
        margin-left: auto;
        margin-right: auto;
      }
      @media (min-width: 768px) {
        .story-intro-panel {
          padding: 2.75rem 3rem;
        }
      }
      .story-intro-body {
        font-size: 1.0625rem;
        line-height: 1.9;
      }
      @media (min-width: 768px) {
        .story-intro-body {
          font-size: 1.125rem;
          line-height: 2;
        }
      }
      .story-intro-body p {
        margin: 0;
      }
      .story-intro-body p + p {
        margin-top: 1.5rem;
      }
      .friends-bar {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        flex-wrap: wrap;
        padding: 0.35rem 0.75rem;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(52, 211, 153, 0.4);
        border-radius: 999px;
        font-size: 0.875rem;
        color: #6ee7b7;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      }
      .friend-chip {
        font-size: 1.35rem;
        line-height: 1;
      }
      .friend-reward-card {
        max-width: 28rem;
        margin: 0 auto;
      }
      .story-intro-btn {
        padding: 1.25rem 1.5rem;
        font-size: 1.125rem;
        line-height: 1.65;
        letter-spacing: 0.03em;
      }
      @media (min-width: 768px) {
        .story-intro-btn {
          padding: 1.5rem 2rem;
          font-size: 1.25rem;
          line-height: 1.75;
        }
      }
    </style>
  </head>
  <body class="bg-slate-900 min-h-[100dvh] flex flex-col font-sans">
    <header
      class="bg-slate-800 shadow-lg p-4 flex justify-between items-center flex-wrap gap-2 border-b border-emerald-500/30"
    >
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-emerald-400">
          🎒 New Class Icebreakers
        </h1>
        <p class="text-emerald-200/70 text-sm" id="phase-label">Meet classmates · Spin · Ask</p>
      </div>
      <div id="friends-collected" class="friends-bar" aria-label="New friends collected"></div>
      <a
        id="hub-link"
        href="/apps/grammar-hub/index.html?tab=wh&series=how"
        class="px-4 py-2 bg-slate-700 text-emerald-100 rounded-xl hover:bg-slate-600 border border-emerald-500/30 font-bold text-sm transition-colors"
      >
        🏠 Back
      </a>
    </header>

    <main class="flex-1 p-4 md:p-6 max-w-3xl mx-auto w-full" id="game-main"></main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
