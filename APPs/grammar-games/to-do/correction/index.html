<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抓蟲遊戲 - 文法挑錯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../../../shared/styles/style.scss">
    <style>
        .token {
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            margin: 0 0.2rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
        }
        .token:hover {
            background-color: rgba(59, 130, 246, 0.1);
            transform: scale(1.05);
        }
        .token.selected {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            transform: scale(1.1);
        }
        .token.correct-hit {
            background-color: #10b981; /* green-500 */
            color: white;
            animation: bounce 0.5s ease;
        }
        .token.miss {
            background-color: #ef4444; /* red-500 */
            color: white;
            animation: shake 0.4s ease;
        }

        /* 震動與彈跳動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 隱藏/顯示過渡 */
        .hidden-panel {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col overflow-hidden m-0 p-0 text-slate-800">
    <!-- Header: 分數、計時、生命 -->
    <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-4">
            <button id="btn-back" class="w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-slate-200 rounded-full transition" title="返回大廳">
                <span class="text-xl">🏠</span>
            </button>
            <div class="text-xl font-bold text-slate-700 font-mono">
                SCORE: <span id="score-display" class="text-blue-600">0</span>
            </div>
            <div id="combo-display" class="text-sm font-bold text-orange-500 hidden">
                Combo x<span id="combo-count">1</span>
            </div>
        </div>

        <div class="flex-1 max-w-md mx-4 hidden sm:block">
            <!-- 進度/計時條 -->
            <div class="h-4 bg-slate-200 rounded-full overflow-hidden relative">
                <div id="time-bar" class="h-full bg-blue-500 transition-all duration-1000 ease-linear w-full"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[0.65rem] font-bold text-slate-700 mix-blend-color-burn">
                    <span id="time-text">30s</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-1 text-2xl" id="hp-display">
            <!-- 愛心由 JS 產生 -->
            ❤️❤️❤️
        </div>
    </header>

    <!-- Main Play Area: 題目顯示 -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 relative overflow-y-auto">
        <!-- 難度或提示 -->
        <div id="question-info" class="text-sm font-bold text-slate-500 mb-6 bg-white px-4 py-1 rounded-full shadow-sm">
            Lv.1 | 尋找 1 隻蟲 🐛
        </div>

        <!-- 句子容器 -->
        <div id="sentence-container" class="text-3xl md:text-5xl lg:text-6xl font-bold leading-relaxed text-center max-w-5xl selection:bg-transparent flex flex-wrap justify-center gap-y-4">
            <!-- Tokens 會在這裡生成 -->
            <span class="token">Loading</span>
            <span class="token">questions...</span>
        </div>
        
        <!-- 狀態提示（答對答錯動畫） -->
        <div id="feedback-msg" class="absolute top-1/3 left-1/2 transform -translate-x-1/2 text-4xl font-black opacity-0 pointer-events-none transition-opacity duration-300">
            Good Job!
        </div>
    </main>

    <!-- Footer: 修正面板 (Correction Panel) -->
    <footer id="correction-panel" class="bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 sm:p-6 shrink-0 transform translate-y-full transition-transform duration-300">
        <div class="max-w-3xl mx-auto flex flex-col items-center">
            <h3 class="text-lg font-bold text-slate-700 mb-4">請選擇正確的修改方式：</h3>
            <div id="options-container" class="w-full grid grid-cols-1 sm:grid-cols-3 gap-3">
                <!-- 選項按鈕由 JS 產生 -->
                <button class="bg-slate-100 hover:bg-slate-200 font-bold py-3 px-4 rounded-xl text-lg text-slate-700 transition">Option 1</button>
                <button class="bg-slate-100 hover:bg-slate-200 font-bold py-3 px-4 rounded-xl text-lg text-slate-700 transition">Option 2</button>
                <button class="bg-slate-100 hover:bg-slate-200 font-bold py-3 px-4 rounded-xl text-lg text-slate-700 transition">Option 3</button>
            </div>
        </div>
    </footer>

    <!-- 解析與結算 Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden-panel">
        <div id="modal-content" class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
            <div id="modal-icon" class="text-6xl text-center mb-4">💡</div>
            <h2 id="modal-title" class="text-2xl font-black text-center text-slate-800 mb-2">解析</h2>
            <p id="modal-desc" class="text-slate-600 text-lg mb-8 text-center leading-relaxed">
                這裡顯示解析內容。
            </p>
            <div class="flex justify-center">
                <button id="btn-modal-action" class="bg-blue-600 hover:bg-blue-700 text-white font-black text-xl py-3 px-10 rounded-2xl shadow-md transition transform hover:scale-105">
                    繼續 / 下一題
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
</body>
</html>
