<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Explorer</title>
  <link rel="stylesheet" href="../../shared/styles/style.scss">
  <link rel="stylesheet" href="./src/reading.scss">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="../../shared/config/tailwind-theme.js"></script>
</head>
<body class="h-[100dvh] overflow-hidden m-0 p-0 bg-[#f4f7f6]">
  <div class="reading-container h-full flex flex-col">
    <header class="header shrink-0">
      <div class="header-info">
        <h1>Reading Explorer</h1>
        <div class="unit-selector-container" style="margin-top: 10px;">
          <select id="paragraph-selector" style="padding: 5px 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-left: 10px;">
            <!-- 段落選項動態生成 -->
          </select>
        </div>
      </div>
      <div class="stats">
        <div class="stat-box">Coins: <span id="coin-count">0</span></div>
      </div>
    </header>

    <main class="game-area flex-1 min-h-0">
      <!-- 左側：文章閱讀區 -->
      <section class="article-panel">
        <h2 class="panel-title" id="article-title">Story: Loading...</h2>
        <div id="article-content" class="article-content">
          <!-- 句子會由 TS 動態生成 -->
        </div>
      </section>

      <!-- 右側：大富翁地圖區 -->
      <section class="board-panel">
        <div class="dice-area">
          <button id="dice-btn" class="dice-btn" title="Roll Dice">🎲</button>
        </div>
        
        <div class="board-wrapper">
          <div class="board" id="board">
            <!-- 格子與玩家棋子會由 TS 動態生成 -->
            <div id="player-token" class="player-token">🚶</div>
          </div>
        </div>
      </section>
    </main>

    <!-- 題目彈窗 Modal -->
    <div id="question-modal" class="modal hidden">
      <div class="modal-content question-content relative">
        <button id="q-close-btn" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl font-bold leading-none">&times;</button>
        <span class="type-badge" id="q-type" style="display: none;"></span>
        <h3 id="q-text">Question Text Here?</h3>
        <div id="q-options" class="options-container">
          <!-- 選項動態生成 -->
        </div>
        <p id="q-feedback" class="feedback hidden"></p>
        <div class="flex justify-center gap-4 mt-6">
          <button id="q-skip-btn" class="action-btn !bg-gray-400 hover:!bg-gray-500">Skip Question</button>
          <button id="q-next-btn" class="action-btn hidden">Continue Adventure</button>
        </div>
      </div>
    </div>

    <!-- 段落完成彈窗 Modal -->
    <div id="finish-modal" class="modal hidden">
      <div class="modal-content finish-content">
        <h2>🎉 Paragraph Completed!</h2>
        <p>You have read all the sentences and earned <span id="final-coins">0</span> coins!</p>
        <div class="flex justify-center gap-4 mt-6">
          <button id="next-para-btn" class="action-btn">Continue to Next Paragraph</button>
          <button id="summary-challenge-btn" class="action-btn hidden !bg-purple-600 hover:!bg-purple-700 text-white font-bold">Unit Summary Challenge</button>
          <button id="back-hub-btn" class="action-btn !bg-gray-400 hover:!bg-gray-500">Back to Reading Hub</button>
        </div>
      </div>
    </div>

    <main id="summary-area" class="hidden flex-1 min-h-0 flex-col bg-white p-6 md:p-10 overflow-hidden">
      <h2 class="text-3xl font-bold mb-6 text-indigo-600 text-center">📝 Unit Summary Challenge</h2>
      <p class="text-gray-600 mb-6 text-center text-lg">請將上方單字填入對應的空格中，完成各段落的文章摘要！<br><span class="text-sm">(先點擊空格，再點選單字填入；點擊已填入的空格可將單字退回)</span></p>
      
      <!-- 單字庫 -->
      <div id="summary-word-bank" class="flex flex-wrap gap-3 p-6 bg-purple-100 rounded-xl mb-8 border-2 border-dashed border-purple-400 min-h-[80px] shadow-sm justify-center shrink-0">
      </div>

      <!-- 摘要句子區 -->
      <div id="summary-sentences" class="text-left space-y-8 mb-8 text-xl leading-loose flex-1 overflow-y-auto px-4">
      </div>

      <div id="summary-feedback" class="feedback hidden mb-6 shrink-0"></div>

      <div class="flex justify-center gap-6 mt-4 shrink-0">
        <button id="summary-submit-btn" class="action-btn !bg-green-600 hover:!bg-green-700 !text-white px-10 py-4 text-xl rounded-xl">Submit (送出答案)</button>
        <button id="summary-hub-btn" class="action-btn hidden !bg-gray-500 hover:!bg-gray-600 !text-white px-10 py-4 text-xl rounded-xl">Back to Reading Hub</button>
      </div>
    </main>

    <a href="../reading-hub/index.html" class="fixed top-6 right-6 flex items-center gap-2 px-5 py-2.5 bg-[#f8f9fa] hover:bg-[#e9ecef] border border-[#ddd] rounded-full text-[#333] font-bold no-underline transition-all shadow-sm z-50 text-lg hover:-translate-y-0.5 hover:shadow-md">
      🏠 回閱讀大廳
    </a>
  </div>
  <script type="module" src="./src/reading.ts"></script>
</body>
</html>
